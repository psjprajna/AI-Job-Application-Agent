<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AI Job Application Agent</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        width: 320px;
        padding: 16px;
        margin: 0;
        background: #fafaf9;
        color: #18181b;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 4px;
      }
      p {
        font-size: 12px;
        color: #52525b;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        padding: 8px;
        font-size: 12px;
        border: 1px solid #e4e4e7;
        border-radius: 6px;
        box-sizing: border-box;
        margin-bottom: 10px;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #6d28d9;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover {
        background: #5b21b6;
      }
      .status {
        margin-top: 10px;
        font-size: 11px;
        color: #16a34a;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>AI Job Application Agent</h1>
    <p>Connects this extension to your local app instance.</p>
    <label for="api">API base URL</label>
    <input id="api" type="url" placeholder="http://localhost:3000" />
    <button id="save">Save</button>
    <div class="status" id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
